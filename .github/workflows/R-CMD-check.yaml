# For help debugging build failures open an issue on the r-lib/actions repo (https://github.com/r-lib/actions)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: R-CMD-check

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    # macOS + R-devel is intentionally OMITTED from the matrix.
    #
    # macOS arm64 has no binary CRAN repo for R-devel (4.7+), so
    # setup-r-dependencies must compile heavy compiled packages
    # (notably brms / rstan / RcppParallel / BH-using transitive
    # deps) from source. Builds either time out or fail on missing
    # system headers. This is a well-known platform limitation for
    # brms-using packages and matches what r-lib's own brms/cmdstanr
    # CI does. R-devel signal is still covered by ubuntu-latest-devel
    # and windows-latest-devel; macOS coverage stays on macos-release
    # and macos-oldrel-1.
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'oldrel-1'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'devel'}
          - {os: windows-latest, r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--as-cran")'
